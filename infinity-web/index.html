<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity | Terminal Helpers</title>
    
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/panoramic.css">
<style>
    /* --- Base Page Setup --- */
    body {
        background-color: #1a1a1a; /* Obsidian Dark Background */
        color: #dcddde;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.6;
        padding: 40px;
        max-width: 800px;
        margin: 0 auto;
    }

    /* --- Universal Callout Styling --- */
    .callout {
        margin: 1.5em 0;
        border-left: 4px solid;
        border-radius: 4px;
        overflow: hidden;
    }

    /* Title & Summary (Header) */
    .callout-title, 
    .callout summary {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: default;
        list-style: none; /* Hide default HTML arrow */
    }

    /* Remove the default arrow in Safari */
    .callout summary::-webkit-details-marker { 
        display: none; 
    }

    /* Content Area */
    .callout-content {
        padding: 12px 16px;
        background-color: rgba(255, 255, 255, 0.03);
    }

    /* Reset margins for elements inside the content */
    .callout-content p:first-child,
    .callout-content ol:first-child {
        margin-top: 0;
    }
    .callout-content p:last-child,
    .callout-content ol:last-child {
        margin-bottom: 0;
    }

    /* --- THE SPARK: Info Variant (Blue) --- */
    .callout-info {
        border-left-color: #086ddd;
        background-color: rgba(8, 109, 221, 0.1);
    }
    .callout-info .callout-title,
    .callout-info summary {
        color: #086ddd;
        cursor: pointer; /* Pointer because it's clickable */
    }
    /* Add a small custom arrow for the collapsible info */
    .callout-info summary::before {
        content: "▶";
        font-size: 0.7em;
        transition: transform 0.2s;
    }
    details[open].callout-info summary::before {
        transform: rotate(90deg);
    }

    /* --- DR INFINITY: Question Variant (Teal) --- */
    .callout-question {
        border-left-color: #00bfbc;
        background-color: rgba(0, 191, 188, 0.1);
    }
    .callout-question .callout-title {
        color: #00bfbc;
    }

    /* Bold emphasis within content */
    strong {
        color: #ffffff;
        text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
    }
</style>
</head>
<body>
    <div id="app">
        <div class="inf-loading-screen" style="display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #7c3aed; background: #070b12;">
            [ INITIALIZING INFINITY CORE... ]
        </div>
    </div>
    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="components/docs/injector.js"></script>
</body>
</html>
