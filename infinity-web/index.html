<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity | Terminal Helpers</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/text.css">    
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/panoramic.css">
</head>
<body>
    <div class="inf-loading-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: 9999; display: flex; align-items: center; justify-content: center; font-family: monospace; color: #7c3aed; background: #070b12;">
        [ INITIALIZING INFINITY CORE... ]
    </div>

    <div id="app"></div>

    <script>
        window.addEventListener('load', () => {
            const loader = document.querySelector('.inf-loading-screen');
            if (loader) {
                loader.innerText = "[ SYSTEM READY - EXECUTING ]";
                loader.style.transition = 'opacity 0.5s ease, filter 0.5s ease';
                loader.style.opacity = '0';
                loader.style.filter = 'blur(10px)';
                setTimeout(() => loader.remove(), 500);
            }
        });
    </script>

    <script type="module" src="assets/js/app.js"></script>
    <script type="module" src="components/docs/injector.js"></script>
</body>
</html>
