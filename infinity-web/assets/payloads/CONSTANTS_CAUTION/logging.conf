# ==============================================================================
# GLOBAL SYSTEM LOGGING CONFIGURATION
# Location: $TOOLS_ROOT/etc/log/logging.conf
# ==============================================================================
export TOOLS_LOG="/data/data/com.termux/files/home/.tools/tools/log"
# 1. Identity Logic: Allow manual export OR fallback to filename
SCRIPT_NAME="${SCRIPT_NAME:-$(basename "${0%.*}")}"

# 2. Time Logic
# _TS format: HHMMSS (24-hour for accurate chronological sorting)
CURRENT_DATE=$(date +%Y/%m/%d/%H)
_TS=$(date +%H%M%S)

# 3. Directory Logic (Hierarchy: Tool -> Category -> Date)
BASE_DIR="$TOOLS_LOG/$SCRIPT_NAME"
PRIMARY_DIR="$BASE_DIR/log/$CURRENT_DATE"
ERR_DIR="$BASE_DIR/errors/$CURRENT_DATE"
DEV_DIR="$BASE_DIR/dev/$CURRENT_DATE"

# 4. Infrastructure Creation
mkdir -p "$PRIMARY_DIR" "$ERR_DIR" "$DEV_DIR"

# 5. File Definitions (Timestamp-First)
# Logic: HHMMSS-filename.ext
LOG_FILE="$PRIMARY_DIR/${_TS}-${SCRIPT_NAME}.log"
ERR_FILE="$ERR_DIR/${_TS}-error.md"
DEV_FILE="$DEV_DIR/${_TS}-dev.md"

# 6. Auto-Initialization (Prevent "No such file" errors)
touch "$LOG_FILE" "$ERR_FILE" "$DEV_FILE"

# Global Alias for redirection
# Use: cmd >> "$DEV_FILE" 2>&1
