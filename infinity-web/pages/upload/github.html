<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity - GitHub Submissions</title>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; padding: 20px; }
        .inf-page { max-width: 600px; width: 100%; background: #161b22; padding: 2rem; border-radius: 8px; border: 1px solid #30363d; }
        h2 { color: #58a6ff; margin-top: 0; }
        .inf-category-desc { color: #8b949e; font-size: 0.9rem; line-height: 1.5; }
        .inf-form-group { margin-bottom: 1rem; }
        input[type="text"], textarea { 
            width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; 
            color: white; border-radius: 4px; box-sizing: border-box; 
        }
        .inf-btn-primary { 
            background-color: #238636; color: white; border: none; padding: 10px 20px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;
        }
        .inf-btn-primary:hover { background-color: #2ea043; }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        const hash = window.location.hash.replace('#', '') || 'upload';
        const isUpload = hash === 'upload';
        const titleText = isUpload ? 'Upload a Script' : 'Request a Script';
        const labelText = isUpload ? 'Script Content or Link' : 'Describe the tool you need';
        const ghLabel = isUpload ? 'submission' : 'enhancement';

        document.getElementById('content').innerHTML = `
          <div class="inf-page">
            <h2>${titleText.toUpperCase()}</h2>
            <p class="inf-category-desc">
              Infinity is a decentralized static platform. Submissions are securely routed through GitHub Issues.
            </p>
            <form class="inf-form" id="gh-form">
              <div class="inf-form-group">
                <input type="text" id="inf-f-title" placeholder="${isUpload ? 'e.g., Network Scanner Script' : 'e.g., Need a script to automate backups'}" required />
              </div>
              <div class="inf-form-group">
                <textarea id="inf-f-body" placeholder="${labelText}" rows="6" required></textarea>
              </div>
              <button type="submit" class="inf-btn-primary">Submit via GitHub</button>
            </form>
          </div>
        `;

        document.getElementById('gh-form').onsubmit = function(event) {
            event.preventDefault();
            const title = encodeURIComponent((document.getElementById('inf-f-title').value || '').trim());
            const body = encodeURIComponent((document.getElementById('inf-f-body').value || '').trim());
            const url = 'https://github.com/CORPUSTHEKING/infinity/issues/new?title=' + title + '&body=' + body + '&labels=' + ghLabel;
            window.open(url, '_blank');
        };
    </script>
</body>
</html>
